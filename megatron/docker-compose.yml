services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: transport
      POSTGRES_PASSWORD: transport
      POSTGRES_DB: transport
    ports:
      - "5432:5432"
    volumes:
      - transport-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transport -d transport"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  transport-postgres:
